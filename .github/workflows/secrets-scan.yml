name: Secrets Scan (Reusable)

# Reusable workflow — token/sifre commit edilmemis mi kontrol
# Kural 10: Token hardcode ETME

on:
  workflow_call:
    inputs:
      strict:
        description: 'Bulunca fail et'
        required: false
        default: 'true'
        type: string

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Common secret pattern scan
        run: |
          set -e
          strict="${{ inputs.strict }}"
          fail=0

          # Pattern listesi (yaygin token formatlari)
          patterns=(
            'sk-[A-Za-z0-9]{20,}'           # OpenAI/Anthropic style
            'ghp_[A-Za-z0-9]{36}'            # GitHub PAT
            'gho_[A-Za-z0-9]{36}'            # GitHub OAuth
            'github_pat_[A-Za-z0-9_]{82}'    # GitHub fine-grained
            'AKIA[0-9A-Z]{16}'               # AWS access key
            'EAA[A-Za-z0-9]{20,}'            # Meta long-lived token
            'AIza[0-9A-Za-z_-]{35}'          # Google API key
            'xoxb-[0-9]{12,}-[0-9]{12,}'     # Slack bot token
            'fal-[A-Za-z0-9-]{40,}'          # fal.ai
          )

          for p in "${patterns[@]}"; do
            # .git, node_modules, dist klasorlerini skip
            results=$(grep -rE "$p" . \
              --exclude-dir=.git \
              --exclude-dir=node_modules \
              --exclude-dir=dist \
              --exclude-dir=_archive \
              --exclude="*.lock" \
              --exclude="*.lockb" \
              2>/dev/null || true)

            if [ -n "$results" ]; then
              echo "POTANSIYEL SECRET ($p):"
              echo "$results" | head -5
              echo ""
              fail=$((fail + 1))
            fi
          done

          if [ "$fail" -gt 0 ]; then
            echo "Toplam $fail pattern eslesmesi."
            [ "$strict" = "true" ] && exit 1
          else
            echo "Secret pattern bulunamadi."
          fi
